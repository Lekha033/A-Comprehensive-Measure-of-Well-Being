<!DOCTYPE html>
<html>

<head>

    <title>HDI Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Human Development Index Predictor</h1>

<form action="/predict" method="POST">

<label>Life Expectancy</label>

<input type="number"
name="life"
step="0.1"
required>

<label>Mean Years of Schooling</label>

<input type="number"
name="school"
step="0.1"
required>

<label>GNI Per Capita</label>

<input type="number"
name="gni"
required>

<button type="submit">

Predict HDI

</button>

</form>

</div>

</body>

</html>
